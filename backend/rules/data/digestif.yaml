# Regles metier ACP - Digestif
#
# Source primaire : donnees minimales INCa 2023 pour pathologie digestive,
# classification OMS 2019 des tumeurs digestives, recommandations TNCD,
# protocoles CAP. Couvre oesophage, estomac, intestin grele, colon,
# rectum, appendice, foie, voies biliaires, pancreas.

organe: digestif
nom_affichage: "Digestif"
systeme_staging: "TNM 8e edition AJCC/UICC - tumeurs digestives"
description: >
  Couvre toutes les pratiques d'anatomopathologie du tube digestif et des
  organes annexes : biopsies endoscopiques, polypectomies, mucosectomies,
  pieces de resection chirurgicale (colectomie, gastrectomie, etc.),
  biopsies hepatiques, pieces de resection hepatique.

sous_types:

  biopsie_oesophagienne:
    nom: "Biopsie oesophagienne"
    mots_cles_detection:
      - biopsie oesophagienne
      - biopsie oesophage
      - biopsies oesophagiennes
      - biopsie ebo
      - endobrachyoesophage
      - barrett
    champs_obligatoires:
      - nom: "Nombre de fragments et localisation"
        section: macroscopie
        conditions: []
        description: "Nombre de biopsies par niveau (distance en cm des arcades dentaires)."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: "Nature de la lesion (oesophagite, metaplasie intestinale, dysplasie, carcinome)."
      - nom: "Metaplasie intestinale (Barrett)"
        section: microscopie
        conditions: []
        description: "Presence ou absence d'endobrachyoesophage ; longueur et classification de Prague (C/M)."
      - nom: "Grade de dysplasie"
        section: microscopie
        conditions: []
        description: "Absence de dysplasie, dysplasie de bas grade, dysplasie de haut grade, indefini pour la dysplasie."
      - nom: "Type de carcinome"
        section: microscopie
        conditions: [carcinologique]
        description: "Adenocarcinome ou carcinome epidermoide, sous-type OMS."
    marqueurs_ihc_attendus:
      - p53
      - Ki67
    template_macroscopie: >
      Reception de [nombre] biopsies oesophagiennes a [X] cm des arcades
      dentaires, fixees en formol, incluses en totalite.
    notes: >
      Pour le suivi d'un endobrachyoesophage, les biopsies doivent
      etre identifiees par niveau selon le protocole de Seattle
      (biopsies tous les 2 cm en 4 quadrants).

  biopsie_gastrique:
    nom: "Biopsie gastrique"
    mots_cles_detection:
      - biopsie gastrique
      - biopsies gastriques
      - biopsie estomac
      - biopsie fundique
      - biopsie antrale
    champs_obligatoires:
      - nom: "Nombre de fragments et topographie"
        section: macroscopie
        conditions: []
        description: "Nombre de biopsies par site (antre, fundus, angle, cardia)."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: "Nature de la lesion (gastrite, metaplasie, dysplasie, carcinome, lymphome)."
      - nom: "Helicobacter pylori"
        section: microscopie
        conditions: []
        description: "Recherche de H. pylori sur coloration standard et/ou Giemsa modifie."
      - nom: "Gastrite (classification de Sydney)"
        section: microscopie
        conditions: []
        description: "Activite, inflammation chronique, atrophie, metaplasie intestinale : evaluation semi-quantitative."
      - nom: "Grade de dysplasie"
        section: microscopie
        conditions: []
        description: "Selon classification de Vienne : absence, bas grade, haut grade."
      - nom: "Classification de Lauren"
        section: microscopie
        conditions: [carcinologique]
        description: "Type intestinal, diffus ou mixte."
      - nom: "HER2"
        section: immunomarquage
        conditions: [carcinologique, adenocarcinome]
        description: "Score HER2 gastrique (0, 1+, 2+, 3+). Interpretation selon criteres gastriques specifiques."
    marqueurs_ihc_attendus:
      - HER2
      - MMR (MLH1, PMS2, MSH2, MSH6)
      - p53
    template_macroscopie: >
      Reception de [nombre] biopsies gastriques antrales et [nombre]
      biopsies fundiques, fixees en formol, incluses en totalite.
    notes: >
      Le protocole OLGA (Operative Link for Gastritis Assessment)
      est recommande pour evaluer le risque de cancer gastrique.
      La recherche de H. pylori doit etre systematique.

  biopsie_colique:
    nom: "Biopsie colique"
    mots_cles_detection:
      - biopsie colique
      - biopsies coliques
      - biopsie colon
      - biopsie rectale
      - biopsies etagees
      - biopsie ileale
    champs_obligatoires:
      - nom: "Nombre de fragments et topographie"
        section: macroscopie
        conditions: []
        description: "Nombre de biopsies par segment (ileon, caecum, colon droit/transverse/gauche/sigmoide, rectum)."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: "Nature de la lesion (colite, polype, dysplasie, carcinome)."
      - nom: "Architecture muqueuse"
        section: microscopie
        conditions: []
        description: "Distorsion cryptique, atrophie, inflammation de la lamina propria."
      - nom: "Activite inflammatoire"
        section: microscopie
        conditions: []
        description: "Presence de polynucleaires neutrophiles, abces cryptiques, ulcerations."
      - nom: "Colite microscopique"
        section: microscopie
        conditions: []
        description: "Epaississement de la bande collagene sous-epitheliale (colite collagene) ou infiltrat lymphocytaire intra-epithelial (colite lymphocytaire)."
      - nom: "Dysplasie (MICI)"
        section: microscopie
        conditions: []
        description: "En contexte de MICI : absence, indefini, bas grade, haut grade."
    marqueurs_ihc_attendus: []
    template_macroscopie: >
      Reception de biopsies etagees du colon : [nombre] biopsies par
      segment anatomique. Fixation en formol, inclusion en totalite.
    notes: >
      En contexte de MICI (Crohn, RCH), preciser la distribution
      des lesions (continue vs segmentaire) et rechercher des
      granulomes epithelioides (Crohn).

  biopsie_rectale:
    nom: "Biopsie rectale"
    mots_cles_detection:
      - biopsie rectale
      - biopsies rectales
      - biopsie du rectum
      - biopsie anale
    champs_obligatoires:
      - nom: "Nombre de fragments"
        section: macroscopie
        conditions: []
        description: "Nombre et localisation des biopsies."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: "Nature de la lesion."
      - nom: "Sous-type de carcinome"
        section: microscopie
        conditions: [carcinologique]
        description: "Adenocarcinome NOS, mucineux, carcinome epidermoide (canal anal), autre."
      - nom: "MMR / MSI"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Statut des proteines de reparation des mesappariements : MLH1, PMS2, MSH2, MSH6."
    marqueurs_ihc_attendus:
      - MLH1
      - PMS2
      - MSH2
      - MSH6
      - p16
    template_macroscopie: >
      Reception de [nombre] biopsies rectales fixees en formol,
      incluses en totalite.
    notes: >
      Pour les tumeurs du canal anal, la classification HPV/p16
      est essentielle pour la strategie therapeutique.

  polypectomie:
    nom: "Polypectomie / Mucosectomie"
    mots_cles_detection:
      - polypectomie
      - polype
      - mucosectomie
      - emr
      - esd
      - dissection sous-muqueuse
      - resection endoscopique
      - polype colique
      - polype rectal
      - polype gastrique
    champs_obligatoires:
      - nom: "Dimensions du polype"
        section: macroscopie
        conditions: []
        description: "Taille en mm, aspect (pediculee, sessile, plan)."
      - nom: "Type histologique du polype"
        section: microscopie
        conditions: []
        description: >
          Adenome tubuleux, villeux, tubulovilleux, festonne sessile (SSL),
          adenome festonne traditionnel (TSA), hyperplasique, hamartomateux,
          inflammatoire, juvenile, Peutz-Jeghers.
      - nom: "Grade de dysplasie"
        section: microscopie
        conditions: []
        description: "Bas grade ou haut grade. Mention de foyer de carcinome intramuqueux."
      - nom: "Profondeur d'invasion"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Classification de Haggitt (polypes pedicules) ou Kikuchi
          (sm1/sm2/sm3 pour polypes sessiles). Mesure en micrometres
          de la profondeur d'invasion sous-muqueuse.
      - nom: "Budding tumoral"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade de budding (Bd1/Bd2/Bd3) selon ITBCC 2016."
      - nom: "Emboles lymphovasculaires"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Marge de resection profonde"
        section: microscopie
        conditions: [carcinologique]
        description: "Distance tumeur-marge profonde en mm. Saine si >= 1 mm."
      - nom: "Differenciation"
        section: microscopie
        conditions: [carcinologique]
        description: "Bien, moyennement ou peu differencie."
      - nom: "MMR / MSI"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Statut MMR par IHC (MLH1, PMS2, MSH2, MSH6)."
    marqueurs_ihc_attendus:
      - MLH1
      - PMS2
      - MSH2
      - MSH6
    template_macroscopie: >
      Reception d'un polype de X mm, [pediculee/sessile], fixe en formol.
      Encrage de la base de resection. Inclusion en totalite avec coupes
      seriees.
    notes: >
      Les criteres de resection endoscopique curative (pas de
      chirurgie complementaire) sont : marge profonde >= 1 mm,
      differenciation favorable, pas d'emboles, budding Bd1,
      invasion sous-muqueuse < 1000 um.

  colectomie:
    nom: "Colectomie"
    mots_cles_detection:
      - colectomie
      - colectomie droite
      - colectomie gauche
      - colectomie totale
      - hemicolectomie
      - sigmoïdectomie
      - sigmoidectomie
      - resection colique
      - piece de colectomie
      - colectomie subtotale
    champs_obligatoires:
      - nom: "Type de resection"
        section: titre
        conditions: []
        description: "Colectomie droite, gauche, sigmoïdectomie, totale, subtotale."
      - nom: "Dimensions de la piece"
        section: macroscopie
        conditions: []
        description: "Longueur du segment colique en cm."
      - nom: "Taille tumorale"
        section: macroscopie
        conditions: [carcinologique]
        description: "Plus grand diametre tumoral en cm."
      - nom: "Distance aux marges"
        section: macroscopie
        conditions: [carcinologique]
        description: "Distance tumeur-marge proximale et distale en cm."
      - nom: "Perforation macroscopique"
        section: macroscopie
        conditions: [carcinologique]
        description: "Presence ou absence de perforation tumorale ou peritoneoale."
      - nom: "Nombre de ganglions recoltes"
        section: macroscopie
        conditions: [carcinologique]
        description: "Minimum 12 ganglions recommandes pour une stadification adequate."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Adenocarcinome NOS, mucineux (>50%), cellules en bague a chaton, medullaire, micropapillaire, festonne, adenosquameux, indifferencie."
      - nom: "Grade de differenciation"
        section: microscopie
        conditions: [carcinologique]
        description: "Bien differencie, moyennement differencie, peu differencie, indifferencie. Ou systeme OMS 2 grades : bas grade / haut grade."
      - nom: "Budding tumoral"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade Bd1/Bd2/Bd3 selon ITBCC."
      - nom: "Profondeur d'invasion"
        section: microscopie
        conditions: [carcinologique]
        description: "Sous-muqueuse, musculeuse, sous-sereuse, sereuse, organe adjacent."
      - nom: "Emboles lymphovasculaires"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence d'emboles lymphatiques et veineux extramuraux."
      - nom: "Invasion perineurale"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Depots tumoraux"
        section: microscopie
        conditions: [carcinologique]
        description: "Nombre de depots tumoraux pericaecaux/pericoliques."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Marges proximale, distale et circulaire si applicable."
      - nom: "Ganglions envahis / examines"
        section: microscopie
        conditions: [carcinologique]
        description: "Ratio envahis/examines. Minimum 12 ganglions examines."
      - nom: "MMR / MSI"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Statut MMR par IHC : MLH1, PMS2, MSH2, MSH6. Obligatoire pour tout adenocarcinome colorectal."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN (pM si connu) selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - MLH1
      - PMS2
      - MSH2
      - MSH6
    template_macroscopie: >
      Piece de [type] colectomie mesurant X cm de longueur. A la coupe :
      tumeur de X cm de grand axe, ulcerobourgeonnante/vegetante/infiltrante,
      situee a X cm de la marge proximale et X cm de la marge distale.
      Recolte de [nombre] ganglions dans le meso.
    notes: >
      Le statut MMR est OBLIGATOIRE pour tout adenocarcinome colorectal
      selon les recommandations INCa/TNCD. La recherche de mutation BRAF
      V600E est recommandee si perte d'expression de MLH1/PMS2.

  gastrectomie:
    nom: "Gastrectomie"
    mots_cles_detection:
      - gastrectomie
      - gastrectomie totale
      - gastrectomie partielle
      - gastrectomie subtotale
      - piece de gastrectomie
      - antrectomie
    champs_obligatoires:
      - nom: "Type de resection"
        section: titre
        conditions: []
        description: "Gastrectomie totale, subtotale, partielle, antrectomie."
      - nom: "Dimensions de la piece"
        section: macroscopie
        conditions: []
        description: "Dimensions de la piece et longueurs des courbures."
      - nom: "Taille tumorale"
        section: macroscopie
        conditions: [carcinologique]
        description: "Plus grand diametre tumoral en cm."
      - nom: "Localisation tumorale"
        section: macroscopie
        conditions: [carcinologique]
        description: "Cardia, fundus, corps, antre, pylore. Grande ou petite courbure."
      - nom: "Classification de Bormann"
        section: macroscopie
        conditions: [carcinologique]
        description: "Type macroscopique I (polypoïde), II (ulcere), III (infiltrant ulcere), IV (linite)."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Adenocarcinome tubuleux, papillaire, mucineux, cellules en bague a chaton, indifferencie, mixte."
      - nom: "Classification de Lauren"
        section: microscopie
        conditions: [carcinologique]
        description: "Type intestinal, diffus ou mixte."
      - nom: "Grade de differenciation"
        section: microscopie
        conditions: [carcinologique]
        description: "Bien, moyennement, peu differencie."
      - nom: "Profondeur d'invasion"
        section: microscopie
        conditions: [carcinologique]
        description: "Muqueuse (T1a), sous-muqueuse (T1b), musculeuse (T2), sous-sereuse (T3), sereuse (T4a), organe adjacent (T4b)."
      - nom: "Emboles lymphovasculaires"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Invasion perineurale"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Distance tumeur-marge proximale et distale en mm."
      - nom: "Ganglions envahis / examines"
        section: microscopie
        conditions: [carcinologique]
        description: "Ratio envahis/examines. Minimum 15 ganglions recommandes."
      - nom: "HER2"
        section: immunomarquage
        conditions: [carcinologique, adenocarcinome]
        description: "Score HER2 gastrique (criteres gastriques specifiques)."
      - nom: "MMR / MSI"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Statut MMR par IHC."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN (pM si connu) selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - HER2
      - MLH1
      - PMS2
      - MSH2
      - MSH6
      - PD-L1 (CPS)
    template_macroscopie: >
      Piece de [type] gastrectomie mesurant X cm le long de la grande
      courbure et X cm le long de la petite courbure. A la coupe : tumeur
      de X cm de grand axe, localisee au niveau de [site], a X cm de la
      marge proximale et X cm de la marge distale. Recolte de [nombre]
      ganglions dans le petit et le grand epiploon.
    notes: >
      Le score CPS (Combined Positive Score) pour PD-L1 est requis
      pour les adenocarcinomes gastriques avances (decision de
      traitement par immunotherapie). Minimum 15 ganglions recommandes.

  appendicectomie:
    nom: "Appendicectomie"
    mots_cles_detection:
      - appendicectomie
      - appendice
      - piece d'appendicectomie
    champs_obligatoires:
      - nom: "Dimensions de l'appendice"
        section: macroscopie
        conditions: []
        description: "Longueur et diametre maximal en cm."
      - nom: "Aspect macroscopique"
        section: macroscopie
        conditions: []
        description: "Congestif, purulent, perfore, tumoral."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: "Appendicite aigue, chronique, tumeur appendiculaire (NET, mucocele, adenocarcinome)."
      - nom: "Tumeur neuroendocrine (NET)"
        section: microscopie
        conditions: [carcinologique]
        description: "Taille, localisation (pointe, base), grade OMS (G1/G2/G3), invasion de la meso-appendice."
      - nom: "Marge de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Statut de la base appendiculaire."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - chromogranine A
      - synaptophysine
      - Ki67
    template_macroscopie: >
      Piece d'appendicectomie mesurant X cm de longueur et X cm de
      diametre maximal. Aspect [normal/congestif/purulent/perfore].
      A la coupe : lumiere [libre/obliteree]. Inclusion en totalite
      avec coupes seriees de la pointe et de la base.
    notes: >
      Pour les NET appendiculaires < 1 cm a la pointe sans invasion
      du meso, l'appendicectomie seule est suffisante.
      Pour les mucoceles, preciser le type (retention, hyperplasique,
      LAMN, adenocarcinome mucineux) et rechercher la pseudomyxome.

  biopsie_hepatique:
    nom: "Biopsie hepatique"
    mots_cles_detection:
      - biopsie hepatique
      - biopsie du foie
      - ponction biopsie hepatique
      - pbh
      - biopsie foie
    champs_obligatoires:
      - nom: "Longueur et nombre d'espaces portes"
        section: macroscopie
        conditions: []
        description: "Longueur de la carotte en mm et nombre de fragments."
      - nom: "Nombre d'espaces portes"
        section: microscopie
        conditions: []
        description: "Minimum 10-15 espaces portes pour une evaluation adequate."
      - nom: "Score METAVIR"
        section: microscopie
        conditions: [medicale]
        description: >
          Activite (A0 a A3) et fibrose (F0 a F4). A0 : pas d'activite,
          A1 : minime, A2 : moderee, A3 : severe. F0 : pas de fibrose,
          F1 : fibrose portale, F2 : quelques septa, F3 : nombreux septa,
          F4 : cirrhose.
      - nom: "Steatose"
        section: microscopie
        conditions: []
        description: "Presence, type (macro/microvesiculaire), pourcentage, score NAS si NAFLD/NASH."
      - nom: "Inflammation portale"
        section: microscopie
        conditions: []
        description: "Type et intensite de l'infiltrat inflammatoire portal."
      - nom: "Inflammation lobulaire"
        section: microscopie
        conditions: []
        description: "Foyers de necrose, corps acidophiles, inflammation granulomateuse."
      - nom: "Surcharge"
        section: microscopie
        conditions: []
        description: "Fer (Perls), cuivre, amylose, glycogene si cliniquement pertinent."
      - nom: "Type histologique tumoral"
        section: microscopie
        conditions: [carcinologique]
        description: "CHC, cholangiocarcinome, metastase, hepatoblastome, angiosarcome."
      - nom: "Grade de differenciation"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade d'Edmondson-Steiner pour le CHC."
    marqueurs_ihc_attendus:
      - Hep Par 1
      - glypican-3
      - arginase-1
      - CK7
      - CK19
    template_macroscopie: >
      Reception d'une carotte biopsique hepatique mesurant X mm de
      longueur, fixee en formol. Inclusion en totalite. Colorations
      speciales : trichrome de Masson, Perls, PAS diastase, reticuline.
    notes: >
      Une biopsie hepatique adequate doit contenir au moins 10-15
      espaces portes et mesurer >= 15 mm. Mentionner si la biopsie
      est sous-optimale. Le score METAVIR est le standard en France
      pour les hepatopathies chroniques.

  piece_hepatique:
    nom: "Piece de resection hepatique"
    mots_cles_detection:
      - hepatectomie
      - resection hepatique
      - lobectomie hepatique
      - segmentectomie hepatique
      - piece hepatique
      - metastasectomie hepatique
    champs_obligatoires:
      - nom: "Type de resection"
        section: titre
        conditions: []
        description: "Hepatectomie droite/gauche, segmentectomie, metastasectomie."
      - nom: "Dimensions et poids"
        section: macroscopie
        conditions: []
        description: "Trois dimensions en cm et poids en grammes."
      - nom: "Taille tumorale"
        section: macroscopie
        conditions: [carcinologique]
        description: "Plus grand diametre tumoral et nombre de nodules."
      - nom: "Distance aux marges"
        section: macroscopie
        conditions: [carcinologique]
        description: "Distance tumeur-tranche de section en mm."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "CHC, cholangiocarcinome intrahepatique, metastase (preciser l'organe primitif)."
      - nom: "Grade de differenciation"
        section: microscopie
        conditions: [carcinologique]
        description: "Edmondson-Steiner pour CHC. OMS pour cholangiocarcinome."
      - nom: "Invasion vasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Micro et macroinvasion vasculaire (portale, sus-hepatique)."
      - nom: "Satellites"
        section: microscopie
        conditions: [carcinologique]
        description: "Nodules satellites perilesionnels."
      - nom: "Capsule tumorale"
        section: microscopie
        conditions: [carcinologique]
        description: "Complete, incomplete, absente. Effraction capsulaire."
      - nom: "Parenchyme non tumoral"
        section: microscopie
        conditions: []
        description: "Fibrose (METAVIR), steatose, hepatopathie sous-jacente."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Distance tumeur-tranche de section en mm. Saine ou atteinte."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN (pM si connu) selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - Hep Par 1
      - glypican-3
      - arginase-1
      - CK7
      - CK19
      - CD34
    template_macroscopie: >
      Piece d'hepatectomie [type] mesurant X x Y x Z cm, pesant W g.
      A la coupe : nodule tumoral de X cm de grand axe, situe a X mm
      de la tranche de section. Aspect et couleur. Parenchyme non
      tumoral d'aspect [normal/cirrhotique/steatosique].
    notes: >
      Pour les metastases hepatiques de cancer colorectal, evaluer
      la reponse au traitement neoadjuvant selon le TRG (Tumor
      Regression Grade) de Rubbia-Brandt ou Mandard.
