# Regles metier ACP - Neurologie / Neuropathologie
#
# Source primaire : classification OMS 2021 des tumeurs du systeme
# nerveux central (5e edition), recommandations cIMPACT-NOW,
# donnees minimales INCa, protocoles CAP.

organe: neurologie
nom_affichage: "Neurologie / Neuropathologie"
systeme_staging: ""
description: >
  Couvre les prelevements de neuropathologie : biopsies cerebrales
  stereotaxiques, pieces de resection de tumeurs cerebrales, biopsies
  de nerf peripherique. La classification OMS 2021 des tumeurs du SNC
  integre desormais des criteres moleculaires obligatoires pour le
  diagnostic de nombreuses entites.

sous_types:

  biopsie_cerebrale:
    nom: "Biopsie cerebrale (stereotaxique ou ouverte)"
    mots_cles_detection:
      - biopsie cerebrale
      - biopsie stereotaxique
      - biopsie cerveau
      - biopsie cerebrale stereotaxique
      - biopsie neuronaviguee
    champs_obligatoires:
      - nom: "Localisation anatomique"
        section: renseignements_cliniques
        conditions: []
        description: "Lobe, noyaux gris centraux, fosse posterieure, tronc cerebral, moelle epiniere. Lateralite."
      - nom: "Donnees d'imagerie"
        section: renseignements_cliniques
        conditions: []
        description: "Aspect IRM (prise de contraste, necrose, infiltration, localisation, oedeme)."
      - nom: "Nombre de fragments"
        section: macroscopie
        conditions: []
        description: "Nombre et taille des fragments biopsiques."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: >
          Classification OMS 2021 : gliomes diffus de l'adulte
          (astrocytome IDH-mute, oligodendrogliome IDH-mute et
          codeleted 1p/19q, glioblastome IDH-wildtype), gliomes
          pediatriques, ependymome, medulloblastome, meningiome,
          lymphome primitif du SNC, metastase, tumeur glioneuronale,
          tumeur germinale, autre.
      - nom: "Grade OMS"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Grade 1 a 4 selon la classification OMS 2021.
          Astrocytome IDH-mute : grade 2, 3 ou 4.
          Glioblastome IDH-wildtype : grade 4 par definition.
          Oligodendrogliome : grade 2 ou 3.
      - nom: "Cellularite et atypies"
        section: microscopie
        conditions: [carcinologique]
        description: "Densite cellulaire, atypies nucleaires, pleomorphisme."
      - nom: "Mitoses"
        section: microscopie
        conditions: [carcinologique]
        description: "Activite mitotique (nombre de mitoses pour 10 HPF)."
      - nom: "Necrose"
        section: microscopie
        conditions: [carcinologique]
        description: "Necrose palissadique (pseudopalissades) = critere de grade 4 pour glioblastome."
      - nom: "Proliferation microvasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence de proliferation endotheliale glomeruloide = critere de grade 4."
      - nom: "IDH1/IDH2"
        section: immunomarquage
        conditions: [carcinologique]
        description: >
          IHC IDH1 R132H (couvre ~90% des mutations IDH1). Si negatif
          et age < 55 ans ou gliome diffus non GBM : sequencage IDH1/IDH2
          recommande. Critere diagnostique fondamental OMS 2021.
      - nom: "ATRX"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Perte d'expression nucleaire = mutation ATRX, soutient le diagnostic d'astrocytome IDH-mute."
      - nom: "p53"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Surexpression nucleaire diffuse. Associee aux astrocytomes IDH-mutes (mutation TP53 concomitante)."
      - nom: "Ki67"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Index de proliferation. Aide au grading mais non determinant seul."
      - nom: "1p/19q (codeletion)"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Codeletion 1p/19q par FISH ou NGS. Obligatoire pour le diagnostic d'oligodendrogliome."
      - nom: "Promoteur MGMT"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Statut de methylation du promoteur MGMT. Facteur predictif de reponse au temozolomide pour les glioblastomes."
    marqueurs_ihc_attendus:
      - IDH1 R132H
      - ATRX
      - p53
      - Ki67
      - GFAP
      - Olig2
      - synaptophysine
      - EMA
      - BRAF V600E
      - H3K27M
      - H3K27me3
    template_macroscopie: >
      Reception de [nombre] fragments biopsiques cerebraux, fixes en
      formol, inclus en totalite. Congelation d'un fragment pour
      biologie moleculaire.
    notes: >
      La classification OMS 2021 EXIGE des marqueurs moleculaires
      pour le diagnostic : IDH1/IDH2, 1p/19q, ATRX, TERT promoter,
      CDKN2A/B, H3K27M. Un gliome diffus ne peut plus etre classifie
      sans au minimum le statut IDH. Le diagnostic integre
      desormais obligatoirement les donnees moleculaires.

  resection_cerebrale:
    nom: "Piece de resection cerebrale"
    mots_cles_detection:
      - resection cerebrale
      - piece cerebrale
      - craniotomie
      - resection tumorale cerebrale
      - glioblastome
      - exerese cerebrale
    champs_obligatoires:
      - nom: "Type de resection"
        section: titre
        conditions: []
        description: "Resection complete, subtotale, partielle (selon le chirurgien et l'IRM postoperatoire)."
      - nom: "Dimensions de la piece"
        section: macroscopie
        conditions: []
        description: "Dimensions en cm, nombre de fragments si piece fragmentee."
      - nom: "Aspect macroscopique"
        section: macroscopie
        conditions: []
        description: "Couleur, consistance, necrose, hemorragie, calcifications."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Classification OMS 2021 integree (type et marqueurs moleculaires)."
      - nom: "Grade OMS"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade 1 a 4 avec criteres histologiques et moleculaires."
      - nom: "Cellularite et architecture"
        section: microscopie
        conditions: [carcinologique]
        description: "Densite cellulaire, architecture (diffus, compact, papillaire, vasculaire)."
      - nom: "Mitoses"
        section: microscopie
        conditions: [carcinologique]
        description: "Nombre de mitoses pour 10 HPF."
      - nom: "Necrose"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence et type (palissadique, geographique)."
      - nom: "Proliferation microvasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Invasion du parenchyme cerebral"
        section: microscopie
        conditions: [carcinologique]
        description: "Extension au parenchyme cerebral adjacent (critere de malignite pour les meningiomes)."
      - nom: "IDH1/IDH2"
        section: immunomarquage
        conditions: [carcinologique]
        description: "IHC IDH1 R132H +/- sequencage. Obligatoire pour tous les gliomes diffus."
      - nom: "ATRX"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Expression nucleaire (conservee ou perte)."
      - nom: "p53"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Expression nucleaire."
      - nom: "Ki67"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Index de proliferation."
      - nom: "1p/19q"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Codeletion pour le diagnostic d'oligodendrogliome."
      - nom: "Promoteur MGMT"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Methylation du promoteur MGMT."
      - nom: "CDKN2A/B"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Deletion homozygote CDKN2A/B par FISH. Critere de grade 4 pour l'astrocytome IDH-mute."
      - nom: "Promoteur TERT"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Mutation du promoteur TERT. Critere diagnostique du glioblastome IDH-wildtype (avec EGFR amplifie et +7/-10)."
    marqueurs_ihc_attendus:
      - IDH1 R132H
      - ATRX
      - p53
      - Ki67
      - GFAP
      - Olig2
      - synaptophysine
      - NeuN
      - EMA
      - SSTR2A
      - H3K27M
      - H3K27me3
      - BRAF V600E
      - INI1
    template_macroscopie: >
      Piece de resection cerebrale constituee de [nombre] fragments
      mesurant au total X x Y x Z cm. Aspect [grisatre/jaunatre/
      hemorragique/necrotique]. Inclusion en totalite ou echantillonnage
      representatif si piece volumineuse (1 bloc/cm). Congelation pour
      biologie moleculaire.
    notes: >
      Le diagnostic integre OMS 2021 = histologie + marqueurs
      moleculaires. Un astrocytome IDH-mute avec deletion homozygote
      CDKN2A/B est classifie grade 4 meme sans necrose ni
      proliferation microvasculaire. Un gliome diffus IDH-wildtype
      avec mutation TERT, amplification EGFR ou gain 7/perte 10
      est classifie glioblastome, meme sans criteres histologiques
      de grade 4.

  biopsie_nerf:
    nom: "Biopsie de nerf peripherique"
    mots_cles_detection:
      - biopsie de nerf
      - biopsie nerveuse
      - biopsie nerf peripherique
      - biopsie neuromusculaire
      - biopsie sural
      - biopsie nerf sural
    champs_obligatoires:
      - nom: "Nerf biopsie"
        section: renseignements_cliniques
        conditions: []
        description: "Nerf sural (le plus frequent), nerf musculocutane, nerf radial superficiel."
      - nom: "Contexte clinique"
        section: renseignements_cliniques
        conditions: []
        description: "Type de neuropathie (axonale, demyelinisante), EMG, bilan immunologique."
      - nom: "Nombre de fascicules"
        section: microscopie
        conditions: []
        description: "Nombre de fascicules nerveux evaluables."
      - nom: "Densite en fibres myelinisees"
        section: microscopie
        conditions: []
        description: "Evaluation qualitative et quantitative (deplacement, rarefaction)."
      - nom: "Lesions axonales"
        section: microscopie
        conditions: []
        description: "Degenerescence axonale (wallerienne), clusters de regeneration, bulbes en oignon."
      - nom: "Demyelinisation"
        section: microscopie
        conditions: []
        description: "Demyelinisation segmentaire, remyelinisation (bulbes en oignon)."
      - nom: "Infiltrat inflammatoire"
        section: microscopie
        conditions: []
        description: "Type (granulomateux, lymphocytaire, necrosant), localisation (endonevral, perinerveux, epinerveux)."
      - nom: "Vascularite"
        section: microscopie
        conditions: []
        description: "Necrose fibrinoide de la paroi vasculaire, infiltrat inflammatoire perivasculaire."
      - nom: "Depots"
        section: microscopie
        conditions: []
        description: "Amylose (rouge Congo), depots granuleux, inclusions."
      - nom: "Colorations speciales"
        section: microscopie
        conditions: []
        description: "Coupes semifines (bleu de toluidine), teasing de fibres isolees si disponible."
    marqueurs_ihc_attendus:
      - neurofilament
      - S100
      - MBP (Myelin Basic Protein)
      - CD68
      - CD3
      - CD20
    template_macroscopie: >
      Reception d'un fragment de nerf [sural/autre] mesurant X mm de
      longueur. Fixation : formol (histologie standard) et glutaraldehyde
      (coupes semifines, microscopie electronique si prevue).
    notes: >
      L'analyse optimale du nerf peripherique necessite une double
      fixation (formol ET glutaraldehyde) et idealement des coupes
      semifines en resine (bleu de toluidine) pour l'evaluation
      de la myelinisation. Le teasing de fibres isolees est utile
      pour quantifier la demyelinisation segmentaire.
