# Regles metier ACP - Cardiovasculaire
#
# Source primaire : classification ISHLT 2004 revisee 2013 pour les greffes
# cardiaques, classification de Dallas pour les myocardites, recommandations
# ESC pour la pathologie endomyocardique. Pathologie vasculaire selon les
# recommandations de l'AHA et de la SFP.

organe: cardiovasculaire
nom_affichage: "Cardiovasculaire"
systeme_staging: ""
description: >
  Couvre les prelevements d'anatomopathologie cardiovasculaire : biopsies
  endomyocardiques (surveillance de greffe, myocardite), pieces de
  resection vasculaire (endarterectomie, aneurysme), biopsies d'arterite
  temporale, valves cardiaques.

sous_types:

  biopsie_myocardique:
    nom: "Biopsie endomyocardique"
    mots_cles_detection:
      - biopsie myocardique
      - biopsie endomyocardique
      - bem
      - biopsie cardiaque
      - biopsie coeur
      - biopsie greffe cardiaque
      - biopsie de surveillance
    champs_obligatoires:
      - nom: "Nombre de fragments"
        section: macroscopie
        conditions: []
        description: "Nombre de fragments endomyocardiques (minimum 3-4 fragments evaluables recommandes)."
      - nom: "Qualite du prelevement"
        section: microscopie
        conditions: []
        description: "Representativite : presence de myocarde, endocarde, fibrose sous-endocardique artefactuelle (site de biopsie anterieur)."
      - nom: "Grade de rejet cellulaire aigu (ISHLT)"
        section: microscopie
        conditions: []
        description: >
          Classification ISHLT 2004 revisee : Grade 0R (pas de rejet),
          Grade 1R (leger : infiltrat perivasculaire ou interstitiel
          focal, sans necrose myocytaire), Grade 2R (modere : infiltrat
          multifocal avec necrose myocytaire), Grade 3R (severe :
          infiltrat diffus avec necrose extensive, +/- hemorragie,
          vasculite).
      - nom: "Rejet humoral (AMR)"
        section: microscopie
        conditions: []
        description: >
          Classification pAMR : pAMR0 (negatif), pAMR1 (histologie
          seule ou immunopathologie seule), pAMR2 (histologie ET
          immunopathologie positives), pAMR3 (severe).
      - nom: "C4d"
        section: immunomarquage
        conditions: []
        description: "Depot de C4d dans les capillaires endomyocardiques. Critere de rejet humoral."
      - nom: "CD68"
        section: immunomarquage
        conditions: []
        description: "Evaluation de l'infiltrat macrophagique intracapillaire (rejet humoral)."
      - nom: "Fibrose interstitielle"
        section: microscopie
        conditions: []
        description: "Presence et severite de la fibrose interstitielle (effet Quilty, vasculopathie chronique)."
      - nom: "Effet Quilty"
        section: microscopie
        conditions: []
        description: "Presence ou absence d'infiltrats lymphocytaires endocardiques (Quilty A ou B)."
      - nom: "Myocardite"
        section: microscopie
        conditions: []
        description: "Si non greffe : criteres de Dallas (myocardite active, borderline, absente). Type d'infiltrat."
    marqueurs_ihc_attendus:
      - C4d
      - CD3
      - CD20
      - CD68
      - CD34
    template_macroscopie: >
      Reception de [nombre] fragments endomyocardiques fixes en formol,
      inclus en totalite sur au moins 3 niveaux de coupe.
    notes: >
      Le grading ISHLT est le standard international pour la
      surveillance des greffes cardiaques. Les biopsies de
      surveillance sont habituellement realisees a intervalles
      reguliers (hebdomadaire puis mensuel puis trimestriel).
      Minimum 3 fragments myocardiques evaluables requis.

  piece_vasculaire:
    nom: "Piece de resection vasculaire"
    mots_cles_detection:
      - piece vasculaire
      - resection vasculaire
      - aneurysme
      - prothese vasculaire
      - pontage
      - piece aortique
      - dissection aortique
    champs_obligatoires:
      - nom: "Type de prelevement"
        section: titre
        conditions: []
        description: "Segment arteriel, veineux, prothese vasculaire, aneurysme."
      - nom: "Localisation et dimensions"
        section: macroscopie
        conditions: []
        description: "Site anatomique, longueur, diametre, epaisseur de la paroi."
      - nom: "Aspect macroscopique"
        section: macroscopie
        conditions: []
        description: "Calcifications, thrombus mural, anevrysme, dissection, ulceration."
      - nom: "Atherosclerose"
        section: microscopie
        conditions: []
        description: "Stade AHA : I-II (strie lipidique), III-IV (atherome), V (plaque fibrolipidique), VI (plaque compliquee)."
      - nom: "Dissection"
        section: microscopie
        conditions: []
        description: "Presence d'une porte d'entree, localisation dans la media, necrose kystique mediale."
      - nom: "Vascularite"
        section: microscopie
        conditions: []
        description: "Inflammation parietale : granulomateuse (Takayasu, Horton), necrosante (PAN), lymphocytaire."
      - nom: "Thrombus"
        section: microscopie
        conditions: []
        description: "Ancien, recent, organise. Presence de cellules inflammatoires."
      - nom: "Infection"
        section: microscopie
        conditions: []
        description: "Recherche de germes (Gram, PAS, Ziehl-Neelsen si pertinent)."
    marqueurs_ihc_attendus:
      - CD68
      - actine muscle lisse
      - CD34
    template_macroscopie: >
      Reception d'un segment vasculaire de X cm de longueur et X cm de
      diametre. Paroi d'epaisseur [normale/augmentee]. Calcifications
      [presence/absence]. Thrombus mural [oui/non]. Inclusion
      systematique avec coupes transversales.
    notes: >
      La maladie de Horton (arterite a cellules geantes) se
      diagnostique sur la biopsie de l'artere temporale.
      Les aneurysmes aortiques doivent faire rechercher une
      necrose kystique mediale (maladie de Marfan, Ehlers-Danlos).

  biopsie_arterite:
    nom: "Biopsie de l'artere temporale"
    mots_cles_detection:
      - biopsie artere temporale
      - bat
      - biopsie temporale
      - arterite temporale
      - maladie de horton
      - arterite a cellules geantes
    champs_obligatoires:
      - nom: "Longueur de la biopsie"
        section: macroscopie
        conditions: []
        description: "Longueur en cm (minimum 1-2 cm recommande pour eviter les faux negatifs par atteinte segmentaire)."
      - nom: "Aspect macroscopique"
        section: macroscopie
        conditions: []
        description: "Artere normale, rigide, nodulaire, tortueuse."
      - nom: "Inflammation granulomateuse"
        section: microscopie
        conditions: []
        description: "Presence ou absence d'infiltrat inflammatoire granulomateux avec cellules geantes multinucleees."
      - nom: "Destruction de la limitante elastique interne"
        section: microscopie
        conditions: []
        description: "Fragmentation / destruction de la LEI (coloration orceine ou Verhoeff)."
      - nom: "Epaississement intimal"
        section: microscopie
        conditions: []
        description: "Hyperplasie intimale reactive, reduction de la lumiere."
      - nom: "Localisation de l'infiltrat"
        section: microscopie
        conditions: []
        description: "Adventice, media, intima. Pattern transmural ou non."
      - nom: "Necrose fibrinoide"
        section: microscopie
        conditions: []
        description: "Presence ou absence (oriente vers une vascularite necrosante)."
    marqueurs_ihc_attendus:
      - CD68
      - CD3
    template_macroscopie: >
      Reception d'un segment d'artere temporale mesurant X cm de longueur.
      Aspect [normal/rigide/nodulaire]. Inclusion en totalite avec coupes
      seriees sur toute la longueur (minimum 3 niveaux).
    notes: >
      L'atteinte de la maladie de Horton est segmentaire : une
      biopsie negative n'exclut pas le diagnostic. Les coupes seriees
      sur toute la longueur (tous les 200-500 um) sont indispensables.
      Coloration speciale de la limitante elastique interne (orceine
      ou Verhoeff-Van Gieson) obligatoire.

  endarterectomie:
    nom: "Endarterectomie"
    mots_cles_detection:
      - endarterectomie
      - endarterectomie carotidienne
      - piece d'endarterectomie
      - thromboendarterectomie
    champs_obligatoires:
      - nom: "Localisation"
        section: titre
        conditions: []
        description: "Carotide interne, femorale, iliaque, autre."
      - nom: "Dimensions de la piece"
        section: macroscopie
        conditions: []
        description: "Longueur et diametre."
      - nom: "Aspect macroscopique"
        section: macroscopie
        conditions: []
        description: "Plaque atheromateuse, stenose, ulceration, thrombus, calcifications."
      - nom: "Composition de la plaque"
        section: microscopie
        conditions: []
        description: "Noyau lipidique, chape fibreuse, calcifications, neovaisseaux, hemorragie intra-plaque."
      - nom: "Thrombus"
        section: microscopie
        conditions: []
        description: "Presence ou absence. Recent ou organise."
      - nom: "Infiltrat inflammatoire"
        section: microscopie
        conditions: []
        description: "Type et densite de l'infiltrat dans la plaque (macrophages spumeux, lymphocytes)."
    marqueurs_ihc_attendus: []
    template_macroscopie: >
      Piece d'endarterectomie carotidienne mesurant X cm. Plaque
      atheromateuse [ulceree/calcifiee/stenosante]. Thrombus
      [present/absent]. Inclusion en totalite avec coupes
      transversales etagees.
    notes: >
      La presence de neovaisseaux et d'hemorragie intra-plaque
      sont des marqueurs de vulnerabilite de la plaque
      atheromateuse et de risque embolique.
