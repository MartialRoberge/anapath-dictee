# Regles metier ACP - Os et Articulations
#
# Source primaire : classification OMS 2020 des tumeurs des os et des
# tissus mous, grade FNCLCC pour les sarcomes, donnees minimales INCa,
# recommandations du reseau NETSARC+/RESOS.

organe: os_articulations
nom_affichage: "Os et Articulations"
systeme_staging: "TNM 8e edition AJCC/UICC - tumeurs osseuses"
description: >
  Couvre les prelevements d'anatomopathologie osseuse et articulaire :
  biopsies osseuses, pieces de resection tumorale, biopsies synoviales,
  pathologie non tumorale (fracture pathologique, osteomyelite, arthrite).

sous_types:

  biopsie_osseuse:
    nom: "Biopsie osseuse"
    mots_cles_detection:
      - biopsie osseuse
      - biopsie de l'os
      - biopsie osteo
      - carotte osseuse
      - trepan osseux
    champs_obligatoires:
      - nom: "Localisation anatomique"
        section: renseignements_cliniques
        conditions: []
        description: "Os concerne, segment (epiphyse, metaphyse, diaphyse), lateralite."
      - nom: "Donnees radiologiques"
        section: renseignements_cliniques
        conditions: []
        description: "Aspect radiologique (osteolytique, condensant, mixte), taille, matrice."
      - nom: "Nombre de carottes"
        section: macroscopie
        conditions: []
        description: "Nombre et dimensions des carottes biopsiques."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: >
          Classification OMS 2020 : osteosarcome (conventionnel, telangiectasique,
          a petites cellules, parosteal, periosteal), chondrosarcome (conventionnel,
          dedifferencie, mesenchymateux, a cellules claires), sarcome d'Ewing,
          chordome, tumeur a cellules geantes, osteoblastome, chondroblastome,
          fibrome non ossifiant, kyste osseux, metastase, autre.
      - nom: "Matrice tumorale"
        section: microscopie
        conditions: [carcinologique]
        description: "Matrice osteoide, cartilagineuse, ou absence de matrice."
      - nom: "Grade histologique"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Pour les chondrosarcomes : grade 1 (bas grade), grade 2
          (intermediaire), grade 3 (haut grade). Pour les autres
          sarcomes osseux : bas grade / haut grade.
      - nom: "Necrose"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence et pourcentage de necrose tumorale."
      - nom: "Mitoses"
        section: microscopie
        conditions: [carcinologique]
        description: "Activite mitotique (nombre de mitoses pour 10 champs au fort grossissement)."
    marqueurs_ihc_attendus:
      - CD99
      - NKX2.2
      - FLI1
      - SATB2
      - MDM2
      - CDK4
      - brachyury
    template_macroscopie: >
      Reception de [nombre] carottes biopsiques osseuses mesurant X mm,
      fixees en formol. Decalcification [rapide/lente]. Inclusion en
      totalite.
    notes: >
      La correlation radio-clinico-pathologique est ESSENTIELLE pour
      le diagnostic des tumeurs osseuses. Toujours disposer de
      l'imagerie avant l'interpretation. La FISH ou le NGS sont
      souvent necessaires (translocation EWSR1 pour Ewing, amplification
      MDM2 pour osteosarcome parosteal, etc.).

  resection_osseuse:
    nom: "Piece de resection osseuse tumorale"
    mots_cles_detection:
      - resection osseuse
      - piece osseuse
      - prothese tumorale
      - resection segmentaire
      - amputation
      - piece d'amputation
      - desarticulation
    champs_obligatoires:
      - nom: "Type de resection"
        section: titre
        conditions: []
        description: "Resection segmentaire, amputation, desarticulation."
      - nom: "Dimensions de la piece"
        section: macroscopie
        conditions: []
        description: "Dimensions en cm. Longueur du segment osseux."
      - nom: "Taille tumorale"
        section: macroscopie
        conditions: [carcinologique]
        description: "Plus grand diametre tumoral en cm."
      - nom: "Extension aux parties molles"
        section: macroscopie
        conditions: [carcinologique]
        description: "Extension extra-osseuse dans les parties molles adjacentes."
      - nom: "Distance aux marges"
        section: macroscopie
        conditions: [carcinologique]
        description: "Marge osseuse proximale et distale, marge des parties molles."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Classification OMS 2020 complete."
      - nom: "Grade histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade selon le type tumoral (chondrosarcome : 1-3 ; autres : bas/haut grade)."
      - nom: "Necrose tumorale"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Pourcentage de necrose. Apres chimiotherapie neoadjuvante :
          evaluation de la reponse selon Huvos (grade I : < 50%,
          grade II : 50-89%, grade III : 90-99%, grade IV : 100%).
      - nom: "Invasion vasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence d'emboles vasculaires."
      - nom: "Extension articulaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Invasion du cartilage articulaire ou de l'articulation."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Marge osseuse : intracapsulaire, marginale, large, radicale.
          Marge des parties molles en mm. Saine ou atteinte.
      - nom: "Reponse a la chimiotherapie neoadjuvante"
        section: microscopie
        conditions: [carcinologique]
        description: "Grade de Huvos si chimiotherapie neoadjuvante (osteosarcome, Ewing)."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN (pM si connu) selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - CD99
      - NKX2.2
      - SATB2
      - MDM2
      - CDK4
      - desmine
      - brachyury
    template_macroscopie: >
      Piece de resection osseuse [type] mesurant X cm de longueur. A la
      coupe : tumeur de X cm, [aspect], localisee en [epiphyse/metaphyse/
      diaphyse]. Extension aux parties molles [oui/non]. Marge osseuse
      proximale a X cm, marge distale a X cm. Inclusion systematique
      avec photographie macroscopique.
    notes: >
      La reponse histologique a la chimiotherapie neoadjuvante
      (grade de Huvos) est un facteur pronostique majeur pour
      l'osteosarcome et le sarcome d'Ewing. Un bon repondeur
      (grade III-IV, >= 90% de necrose) a un meilleur pronostic.

  biopsie_synoviale:
    nom: "Biopsie synoviale"
    mots_cles_detection:
      - biopsie synoviale
      - biopsie articulaire
      - synoviale
      - synoviorthese
      - piece de synovectomie
    champs_obligatoires:
      - nom: "Localisation articulaire"
        section: renseignements_cliniques
        conditions: []
        description: "Articulation concernee (genou, hanche, epaule, coude, poignet...)."
      - nom: "Nombre de fragments"
        section: macroscopie
        conditions: []
        description: "Nombre et aspect des fragments synoviaux."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: >
          Synovite inflammatoire (polyarthrite rhumatoide : hyperplasie
          synoviale, pannus), synovite villonodulaire pigmentee (TGCT),
          chondromatose synoviale, goutte (microcristaux d'urate), maladie
          a depots de pyrophosphate de calcium (CPDD), synovite infectieuse,
          amylose, autre.
      - nom: "Hyperplasie synoviale"
        section: microscopie
        conditions: []
        description: "Nombre de couches synoviocytaires (normal 1-3). Hyperplasie si > 3-4 couches."
      - nom: "Infiltrat inflammatoire"
        section: microscopie
        conditions: []
        description: "Type (lymphocytes, plasmocytes, polynucleaires, granulomes), densite, distribution."
      - nom: "Depots"
        section: microscopie
        conditions: []
        description: "Cristaux (polarisation), hemosiderine, amylose (rouge Congo)."
      - nom: "Tumeur / proliferation"
        section: microscopie
        conditions: [carcinologique]
        description: "TGCT (ex-SVNP), synovialosarcome, chondrosarcome synovial."
    marqueurs_ihc_attendus:
      - CD68
      - TLE1
      - EMA
      - CK
    template_macroscopie: >
      Reception de [nombre] fragments synoviaux de [couleur/aspect],
      mesurant de X a Y mm. Inclusion en totalite.
    notes: >
      La TGCT (Tenosynovial Giant Cell Tumor, ex-SVNP) est la tumeur
      articulaire la plus frequente. Elle se presente sous forme
      localisee (nodulaire) ou diffuse. La coloration de Perls
      (hemosiderine) est utile. La recherche de translocation CSF1
      par FISH est disponible en cas de doute diagnostique.
