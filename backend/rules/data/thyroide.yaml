# Regles metier ACP - Thyroide (organe: endocrinologie)
#
# Source primaire : donnees minimales INCa 2023 pour pathologie
# thyroidienne, classification OMS 2022 des tumeurs endocrines et
# neuroendocrines, systeme Bethesda 2023 pour les cytoponctions,
# recommandations SFE/ATA.

organe: endocrinologie
nom_affichage: "Thyroide / Endocrinologie"
systeme_staging: "TNM 8e edition AJCC/UICC - cancer de la thyroide"
description: >
  Couvre les prelevements de pathologie thyroidienne : cytoponctions
  (classification de Bethesda), lobectomies, thyroidectomies totales,
  curages ganglionnaires cervicaux.

sous_types:

  cytoponction_thyroidienne:
    nom: "Cytoponction thyroidienne"
    mots_cles_detection:
      - cytoponction thyroidienne
      - cytoponction thyroide
      - ponction thyroidienne
      - fna thyroide
      - cytoponction echoguidee thyroide
    champs_obligatoires:
      - nom: "Localisation du nodule"
        section: renseignements_cliniques
        conditions: []
        description: "Lobe droit, lobe gauche, isthme. Taille echographique et score EU-TIRADS."
      - nom: "Qualite du prelevement"
        section: microscopie
        conditions: []
        description: "Representativite : au moins 6 groupes de cellules folliculaires d'au moins 10 cellules chacun."
      - nom: "Classification de Bethesda"
        section: conclusion
        conditions: []
        description: >
          Bethesda 2023 : I (non diagnostique), II (benin), III (atypie
          de signification indeterminee / AUS/FLUS), IV (neoplasme
          folliculaire / suspicion de neoplasme folliculaire), V (suspicion
          de malignite), VI (malin).
      - nom: "Description cytologique"
        section: microscopie
        conditions: []
        description: "Cellularite, architecture, atypies nucleaires, colloide, fond du frottis."
      - nom: "Precisions diagnostiques"
        section: conclusion
        conditions: [carcinologique]
        description: "Si Bethesda V ou VI : type presume (carcinome papillaire, medullaire, anaplasique, lymphome)."
    marqueurs_ihc_attendus: []
    template_macroscopie: ""
    notes: >
      Le pourcentage de risque de malignite associe a chaque categorie
      Bethesda 2023 doit etre connu du pathologiste : I (~5-10%),
      II (~0-3%), III (~6-18%), IV (~10-40%), V (~45-75%), VI (~94-99%).
      Le BRAF V600E peut etre recherche sur les categories III et IV.

  lobectomie:
    nom: "Lobectomie thyroidienne"
    mots_cles_detection:
      - lobectomie thyroidienne
      - lobectomie thyroide
      - lobo-isthmectomie
      - hemithyroidectomie
    champs_obligatoires:
      - nom: "Dimensions et poids du lobe"
        section: macroscopie
        conditions: []
        description: "Trois dimensions en cm et poids en grammes."
      - nom: "Nombre et taille des nodules"
        section: macroscopie
        conditions: []
        description: "Description de chaque nodule : taille, aspect (solide, kystique, mixte), couleur."
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: >
          Classification OMS 2022 : adenome folliculaire, carcinome
          papillaire (et ses variantes), carcinome folliculaire, carcinome
          peu differencie, carcinome anaplasique, carcinome medullaire,
          NIFTP (neoplasme folliculaire non invasif avec noyaux de type
          papillaire), tumeur folliculaire de potentiel de malignite
          incertain (FT-UMP), tumeur a cellules de Hurthle.
      - nom: "Variante histologique"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Pour le carcinome papillaire : classique, folliculaire,
          sclerosante diffuse, a cellules hautes, a cellules
          columnaires, hobnail, cribriforme-morulaire, etc.
      - nom: "Extension extrathyroidienne"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Minime (extension aux muscles sous-hyoidiens ou tissu
          adipeux perithyroidien) ou massive (extension au larynx,
          trachee, oesophage, nerf recurrent, grands vaisseaux).
      - nom: "Invasion vasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: >
          Absence, invasion vasculaire focale (< 4 vaisseaux),
          invasion vasculaire extensive (>= 4 vaisseaux). Critere
          pronostique majeur pour les carcinomes folliculaires.
      - nom: "Invasion capsulaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Absence, invasion capsulaire minime, effraction capsulaire complete."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Tranche de section de l'isthme et berges laterales."
      - nom: "Thyroidite associee"
        section: microscopie
        conditions: []
        description: "Presence ou absence de thyroidite lymphocytaire chronique (Hashimoto) dans le parenchyme non tumoral."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN selon AJCC 8e edition."
    marqueurs_ihc_attendus:
      - thyroglobuline
      - TTF1
      - PAX8
      - HBME-1
      - CK19
      - galectine-3
    template_macroscopie: >
      Piece de lobectomie thyroidienne [droite/gauche] mesurant X x Y x Z cm,
      pesant W g. A la coupe : nodule de X cm de grand axe, [solide/kystique],
      [encapsule/mal limite], de couleur [blanchatre/brunâtre]. Parenchyme
      non tumoral d'aspect [normal/thyroidite]. Inclusion en totalite du
      nodule et de l'isthme.
    notes: >
      Le NIFTP (ex-variante folliculaire encapsulee non invasive du
      carcinome papillaire) n'est plus considere comme un carcinome
      dans la classification OMS 2022. Il ne necessite pas de pTNM
      ni de traitement complementaire.

  thyroidectomie:
    nom: "Thyroidectomie totale"
    mots_cles_detection:
      - thyroidectomie
      - thyroidectomie totale
      - thyroidectomie subtotale
      - piece de thyroidectomie
    champs_obligatoires:
      - nom: "Dimensions et poids des lobes"
        section: macroscopie
        conditions: []
        description: "Dimensions de chaque lobe et poids total en grammes."
      - nom: "Nombre et taille des nodules"
        section: macroscopie
        conditions: []
        description: "Description de chaque nodule identifie."
      - nom: "Type histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Classification OMS 2022 complete."
      - nom: "Variante histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Preciser la variante pour le carcinome papillaire et le carcinome folliculaire."
      - nom: "Taille tumorale"
        section: microscopie
        conditions: [carcinologique]
        description: "Plus grand diametre tumoral en mm. Microcarcinome si <= 10 mm."
      - nom: "Multifocalite"
        section: microscopie
        conditions: [carcinologique]
        description: "Nombre de foyers tumoraux et localisation (lobe droit, gauche, isthme)."
      - nom: "Extension extrathyroidienne"
        section: microscopie
        conditions: [carcinologique]
        description: "Minime ou massive. Structures envahies."
      - nom: "Invasion vasculaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Focale ou extensive."
      - nom: "Invasion capsulaire"
        section: microscopie
        conditions: [carcinologique]
        description: "Minime ou complete."
      - nom: "Emboles lymphatiques"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Statut des marges chirurgicales."
      - nom: "Ganglions envahis / examines"
        section: microscopie
        conditions: [carcinologique]
        description: "Si curage associe : ratio par compartiment (central VI, lateral III/IV), taille de la plus grande metastase, effraction capsulaire."
      - nom: "Parenchyme non tumoral"
        section: microscopie
        conditions: []
        description: "Thyroidite de Hashimoto, maladie de Basedow, goitre multinodulaire."
      - nom: "BRAF V600E"
        section: biologie_moleculaire
        conditions: [carcinologique]
        description: "Statut BRAF V600E pour les carcinomes papillaires. Impact pronostique et therapeutique."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pT pN (pM si connu) selon AJCC 8e edition. Distinction < 55 ans / >= 55 ans pour le stade."
    marqueurs_ihc_attendus:
      - thyroglobuline
      - TTF1
      - PAX8
      - HBME-1
      - CK19
      - galectine-3
      - calcitonine
      - chromogranine A
      - ACE
    template_macroscopie: >
      Piece de thyroidectomie totale : lobe droit mesurant X x Y x Z cm,
      lobe gauche mesurant X x Y x Z cm, isthme de X cm. Poids total W g.
      A la coupe : nodule de X cm dans le lobe [droit/gauche], [description].
      Recherche de nodules satellites. Inclusion en totalite des nodules,
      prelevements systematiques du parenchyme non tumoral.
    notes: >
      Pour le carcinome medullaire, la calcitonine et l'ACE en IHC
      sont indispensables. Rechercher une mutation RET (NEM2). Le
      pTNM thyroidien utilise un systeme de stadification specifique
      selon l'age (< 55 ans : pas de stade III/IV pour les cancers
      differencies).
