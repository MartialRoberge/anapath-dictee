# Regles metier ACP - Ruleset generique (fallback)
#
# Active quand la classification Claude retourne une confidence < 0.7
# ou un organe inconnu. Contient les champs minimaux que TOUT CR
# anatomopathologique francais doit presenter selon les donnees
# minimales INCa et les bonnes pratiques ACP.
#
# Structure editable : la soeur de Martial peut lire et corriger ce
# fichier directement. Le loader Python valide le schema et refuse
# de demarrer si un champ obligatoire YAML est invalide.

organe: generic
nom_affichage: "Non determine"
systeme_staging: ""
description: >
  Ruleset minimal applique quand l'organe n'a pas pu etre classifie
  avec confiance. Contient les champs obligatoires universels que tout
  compte-rendu anatomopathologique doit comporter, quel que soit l'organe,
  conformement aux exigences INCa et aux bonnes pratiques de l'ACP
  francaise.

sous_types:

  inconnu:
    nom: "Prelevement non specifie"
    mots_cles_detection: []
    champs_obligatoires:
      - nom: "Titre du prelevement"
        section: titre
        conditions: []
        description: "Libelle anatomique du site preleve en majuscules. Nature du prelevement (biopsie, piece operatoire, cytologie)."
      - nom: "Renseignements cliniques"
        section: renseignements_cliniques
        conditions: []
        description: "Contexte clinique, indication du prelevement, antecedents pertinents, traitement prealable eventuel."
      - nom: "Description macroscopique"
        section: macroscopie
        conditions: []
        description: >
          Nombre de fragments ou pieces, dimensions (trois dimensions en cm
          pour les pieces, longueur en mm pour les biopsies), poids si
          piece operatoire, aspect (couleur, consistance), modalite
          de fixation et d'inclusion.
      - nom: "Description microscopique"
        section: microscopie
        conditions: []
        description: >
          Analyse histologique ou cytologique des coupes. Description
          architecturale et cytologique. Colorations speciales realisees
          si applicables.
      - nom: "Type histologique"
        section: microscopie
        conditions: []
        description: >
          Nature de la lesion identifiee : lesion benigne, inflammatoire,
          reactionnelle, tumorale benigne, tumorale maligne, autre.
          Reference a la classification OMS en vigueur si applicable.
      - nom: "Immunohistochimie"
        section: immunomarquage
        conditions: [carcinologique]
        description: "Panel d'anticorps realise, resultats (positif/negatif, intensite, pourcentage), interpretation."
      - nom: "Grade histologique"
        section: microscopie
        conditions: [carcinologique]
        description: "Systeme de grading adapte au type tumoral et a l'organe."
      - nom: "Marges de resection"
        section: microscopie
        conditions: [carcinologique]
        description: "Evaluation des marges chirurgicales si piece de resection. Distance en mm. Saines ou atteintes."
      - nom: "Emboles vasculaires"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence d'emboles lymphatiques et veineux."
      - nom: "Invasion perineurale"
        section: microscopie
        conditions: [carcinologique]
        description: "Presence ou absence d'engainements perinerveux."
      - nom: "pTNM"
        section: conclusion
        conditions: [carcinologique]
        description: "Classification pTNM selon l'edition AJCC en vigueur pour l'organe concerne."
      - nom: "Conclusion diagnostique"
        section: conclusion
        conditions: []
        description: >
          Diagnostic principal en termes nosologiques complets.
          Doit inclure : le site anatomique, la nature de la lesion,
          le sous-type histologique precis (reference OMS), le grade
          si applicable, et le pTNM si tumeur maligne operee.
    marqueurs_ihc_attendus: []
    template_macroscopie: ""
    notes: >
      Ce ruleset n'impose aucune exigence specifique a un organe.
      L'agent doit se concentrer sur la fidelite a la dictee et la
      structure markdown canonique. Pour tout prelevement tumoral,
      les champs conditionnels [carcinologique] s'activent
      automatiquement et couvrent les items minimaux universels
      requis par l'INCa quel que soit l'organe.
