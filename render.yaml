services:
  - type: web
    name: anapath-dictee
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: VOXTRAL_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://anapath-dictee.onrender.com
      # Moteur de generation : mistral (souverain, defaut) — necessite MISTRAL_API_KEY.
      - key: LLM_PROVIDER
        value: mistral
      - key: REPORT_ENGINE
        value: local
